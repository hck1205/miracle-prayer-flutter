<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="miracle_prayer_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>miracle_prayer_flutter</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      background: #f9f9f9;
    }

    body {
      overflow: hidden;
      font-family: Inter, "Malgun Gothic", "Segoe UI", Arial, "Apple SD Gothic Neo", "Nanum Gothic", sans-serif;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      background: #f9f9f9;
      z-index: 9999;
      pointer-events: none;
    }

    #app-loader-bar {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: rgba(173, 179, 180, 0.22);
      overflow: hidden;
    }

    #app-loader-bar::after {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 28%;
      background: #5f5e5e;
      border-radius: 999px;
      animation: miracle-loader-slide 1.25s ease-in-out infinite;
    }

    #app-loader.is-hidden {
      opacity: 0;
      transition: opacity 220ms ease;
    }

    @keyframes miracle-loader-slide {
      0% {
        transform: translateX(-115%);
      }
      50% {
        transform: translateX(170%);
      }
      100% {
        transform: translateX(360%);
      }
    }
  </style>
</head>
<body>
  <div id="app-loader" aria-hidden="true">
    <div id="app-loader-bar"></div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
